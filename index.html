<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <title>沈記蚵腸麵線</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      background: #f9f6f0;
      color: #333;
      line-height: 1.6;
    }

    header {
      background: linear-gradient(135deg, #d94e1f, #b83e11);
      color: white;
      text-align: center;
      padding: 35px 20px;
    }

    header h1 {
      font-size: 2.3rem;
      margin-bottom: 6px;
    }

    main {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    section {
      margin-bottom: 30px;
    }

    h2 {
      color: #d94e1f;
      border-bottom: 2px solid #d94e1f;
      padding-bottom: 5px;
      margin-bottom: 15px;
    }

    /* 頂部狀態區 */
    .top-action {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* 狀態 */
    .status-box {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 18px;
      font-weight: bold;
      text-align: center;
      min-width: 220px;
      backdrop-filter: blur(4px);
    }

    .open {
      background: #e6ffed;
      color: #1a7f37;
      border: 2px solid #1a7f37;
    }

    .closed {
      background: #ffe6e6;
      color: #b30000;
      border: 2px solid #b30000;
    }

    /* 頂部LINE按鈕 */
    .header-line-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #06c755;
      color: white;
      padding: 12px 18px;
      border-radius: 18px;
      text-decoration: none;
      font-weight: bold;
      font-size: 0.95rem;
      border: 2px solid rgba(255, 255, 255, 0.25);
      transition: 0.2s ease;
      min-height: 68px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    }

    .header-line-btn:hover {
      background: #05b34a;
      transform: translateY(-1px);
    }

    /* 圖片 */
    .food-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    .food-gallery img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 12px;
    }

    /* 菜單 */
    .menu {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }

    .menu-item {
      background: white;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    /* LINE按鈕 */
    .line-btn {
      display: inline-block;
      background: #06c755;
      color: white;
      padding: 12px 18px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: bold;
      margin-top: 10px;
      transition: 0.2s ease;
    }

    .line-btn:hover {
      background: #05b34a;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #eee;
      margin-top: 30px;
    }

    /* 手機版 */
    @media (max-width: 600px) {
      .top-action {
        flex-direction: column;
      }

      .status-box,
      .header-line-btn {
        width: 100%;
        max-width: 320px;
      }

      .header-line-btn {
        min-height: auto;
      }
    }

    /* 浮動LINE按鈕 */
.floating-line {
  position: fixed;
  right: 20px;
  bottom: 20px;

  background: #06c755;
  color: white;

  width: 68px;
  height: 68px;

  border-radius: 50%;

  display: flex;
  align-items: center;
  justify-content: center;

  text-decoration: none;
  font-weight: bold;
  font-size: 1rem;

  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);

  z-index: 9999;

  transition: 0.2s ease;
}

.floating-line:hover {
  background: #05b34a;
  transform: scale(1.08);
}

/* 手機版 */
@media (max-width: 600px) {
  .floating-line {
    width: 60px;
    height: 60px;
    font-size: 0.9rem;
    right: 14px;
    bottom: 14px;
  }
}
  </style>
</head>

<body>

  <header>
    <h1>沈記蚵腸麵線</h1>
    <p>新北市三重區公園街26號對面</p>

    <!-- 頂部狀態＋LINE -->
    <div class="top-action">

      <!-- 狀態 -->
      <div id="statusBox" class="status-box">
        <div id="statusText">狀態判斷中...</div>
        <div id="countdownText"></div>
      </div>

      <!-- 頂部LINE -->
      <a class="header-line-btn"
        href="https://line.me/R/ti/p/@923ushmy"
        target="_blank">
        💬 一鍵加 LINE 打給老闆
      </a>

    </div>
  </header>

  <main>

    <!-- 關於 -->
    <section>
      <h2>關於我們</h2>
      <p>每日東石鮮蚵直送，溫體黑豬腸，㊣新竹ISO手工紅麵線，用料實在。</p>
    </section>

    <!-- 圖片 -->
    <section>
      <h2>■鮮蚵■大腸■綜合■清麵線</h2>
      <div class="food-gallery">
        <img src="noodle1.png" alt="麵線1">
        <img src="noodle2.png" alt="麵線2">
      </div>
    </section>

    <!-- 營業時間 -->
    <section>
      <h2>營業時間</h2>
      <p>17:00 - 22:30（每週三公休）</p>
    </section>

    <!-- 菜單 -->
    <section>
      <h2>菜單</h2>
      <div class="menu">
        <div class="menu-item">鮮蚵麵線 小55 / 大70</div>
        <div class="menu-item">大腸麵線 小55 / 大70</div>
        <div class="menu-item">綜合麵線 小55 / 大70</div>
        <div class="menu-item">清麵線 小30 / 大40</div>
      </div>
    </section>

    <!-- LINE -->
    <section>
      <h2>LINE</h2>
      <a class="line-btn" href="https://line.me/R/ti/p/@923ushmy" target="_blank">
        💬 一鍵加 LINE 打給老闆
      </a>
    </section>

  </main>

  <footer>
    © 2026 沈記蚵腸麵線
  </footer>

  <!-- 狀態JS -->
  <script>
    function updateStatus() {
      const now = new Date();
      const day = now.getDay();
      const min = now.getHours() * 60 + now.getMinutes();

      const open = 17 * 60;
      const close = 22 * 60 + 30;

      const box = document.getElementById("statusBox");
      const text = document.getElementById("statusText");
      const cd = document.getElementById("countdownText");

      if (day === 3) {
        text.innerText = "🔴 今日公休";
        cd.innerText = "";
        box.className = "status-box closed";
        return;
      }

      if (min < open || min > close) {
        text.innerText = "🔴 已打烊";
        cd.innerText = "";
        box.className = "status-box closed";
        return;
      }

      box.className = "status-box open";
      text.innerText = "🟢 營業中";

      const remain = close - min;
      cd.innerText = `⏳ 距離打烊還有 ${Math.floor(remain / 60)} 小時 ${remain % 60} 分`;
    }

    updateStatus();
    setInterval(updateStatus, 1000);
  </script>

  <!-- 浮動LINE按鈕 -->
<a class="floating-line"
  href="https://line.me/R/ti/p/@923ushmy"
  target="_blank">
  💬 LINE
</a>

</body>

</html>
