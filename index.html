<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <title>沈記蚵腸麵線</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      background: #f9f6f0;
      color: #333;
      line-height: 1.6;
    }

    header {
      background: linear-gradient(135deg, #d94e1f, #b83e11);
      color: white;
      text-align: center;
      padding: 28px 20px;
    }

    header h1 {
      font-size: 2.3rem;
      margin-bottom: 6px;
    }

    main {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    section {
      margin-bottom: 30px;
    }

    h2 {
      color: #d94e1f;
      border-bottom: 2px solid #d94e1f;
      padding-bottom: 5px;
      margin-bottom: 15px;
    }

    /* 頂部狀態區（只保留狀態） */
    .top-action {
      margin-top: 14px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 狀態燈（縮小版） */
    .status-box {
      display: inline-block;
      padding: 9px 14px;
      border-radius: 14px;
      font-weight: bold;
      text-align: center;
      min-width: 160px;
      font-size: 0.9rem;
    }

    .open {
      background: #e6ffed;
      color: #1a7f37;
      border: 2px solid #1a7f37;
    }

    .closed {
      background: #ffe6e6;
      color: #b30000;
      border: 2px solid #b30000;
    }

    /* 圖片 */
    .food-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    .food-gallery img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
    }

    /* 菜單 */
    .menu {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }

    .menu-item {
      background: white;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #ddd;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #eee;
      margin-top: 30px;
    }

    /* 浮動 LINE 按鈕 */
    .floating-line {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 9999;
    }

    .floating-line a {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #06c755;
      color: white;
      text-decoration: none;
      padding: 14px 18px;
      border-radius: 999px;
      font-weight: bold;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
      transition: 0.2s ease;
      animation: pulse 2s infinite;
    }

    .floating-line a:hover {
      background: #05b34a;
      transform: scale(1.03);
    }

    .line-icon {
      font-size: 1.3rem;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    /* 手機版 */
    @media (max-width: 600px) {
      .status-box {
        width: 100%;
        max-width: 260px;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>三重 沈記蚵仔大腸麵線</h1>
    <p>新北市三重區公園街26號對面</p>

    <!-- 只保留營業狀態 -->
    <div class="top-action">
      <div id="statusBox" class="status-box">
        <div id="statusText">狀態判斷中...</div>
        <div id="countdownText"></div>
      </div>
    </div>
  </header>

  <main>

    <section>
      <h2>大腸麵線 鮮蚵麵線 綜合麵線</h2>
      <p>每日東石鮮蚵直送，溫體黑豬腸，手工紅麵線，用料實在。</p>
    </section>

    <section>
      <h2>■鮮蚵麵線■大腸麵線■綜合麵線■清麵線</h2>

      <div class="food-gallery">
        <img src="noodle1.png" alt="麵線1">
        <img src="noodle2.png" alt="麵線2">
      </div>
    </section>

    <section>
      <h2>營業時間</h2>
      <p>17:00 - 22:30（每週三公休）</p>
    </section>

    <section>
      <h2>菜單</h2>

      <div class="menu">
        <div class="menu-item">鮮蚵麵線 小55 / 大70</div>
        <div class="menu-item">大腸麵線 小55 / 大70</div>
        <div class="menu-item">綜合麵線 小55 / 大70</div>
        <div class="menu-item">清麵線 小30 / 大40</div>
      </div>
    </section>

  </main>

  <footer>
    © 2026 沈記蚵腸麵線
  </footer>

  <!-- 浮動 LINE 按鈕（唯一LINE） -->
  <div class="floating-line">
    <a href="https://line.me/R/ti/p/@923ushmy" target="_blank">
      <span class="line-icon">💬</span>
      <span>LINE詢問</span>
    </a>
  </div>

  <script>
    function updateStatus() {
      const now = new Date();
      const day = now.getDay();
      const min = now.getHours() * 60 + now.getMinutes();

      const open = 17 * 60;
      const close = 22 * 60 + 30;

      const box = document.getElementById("statusBox");
      const text = document.getElementById("statusText");
      const cd = document.getElementById("countdownText");

      if (day === 3) {
        text.innerText = "🔴 今日公休";
        cd.innerText = "";
        box.className = "status-box closed";
        return;
      }

      if (min < open || min > close) {
        text.innerText = "🔴 準備中..下午5點開賣";
        cd.innerText = "";
        box.className = "status-box closed";
        return;
      }

      box.className = "status-box open";
      text.innerText = "🟢 營業中";

      const remain = close - min;
      cd.innerText = `⏳ 距離打烊還有 ${Math.floor(remain / 60)} 小時 ${remain % 60} 分`;
    }

    updateStatus();
    setInterval(updateStatus, 1000);
  </script>

</body>

</html>
